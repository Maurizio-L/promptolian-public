<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <style>
      text { font-family: 'DM Sans', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="340" fill="#0e0e0e" rx="12"/>

  <!-- Title -->
  <text x="300" y="30" fill="#f5f4ef" font-size="14" font-weight="700" text-anchor="middle">KV-Sandwich Architecture</text>
  <text x="300" y="48" fill="#666" font-size="10.5" text-anchor="middle">Only the MIDDLE is compressed — facts at both ends are safe</text>

  <!-- Conversation window outline -->
  <rect x="40" y="68" width="400" height="248" rx="10" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- HEAD block -->
  <rect x="40" y="68" width="400" height="72" rx="10" fill="#1a2800" stroke="#c8f135" stroke-width="2"/>
  <rect x="40" y="120" width="400" height="20" fill="#1a2800"/><!-- overlap fixer for border radius bottom -->
  <text x="60" y="96" fill="#c8f135" font-size="11" font-weight="700">HEAD — Turns 1–2</text>
  <text x="60" y="112" fill="#9cb830" font-size="10">VERBATIM</text>
  <text x="148" y="112" fill="#555" font-size="10">·  Session framing, constraints, system context</text>
  <text x="60" y="128" fill="#666" font-size="9.5">Kept intact — losing this turn is catastrophic</text>

  <!-- MIDDLE block -->
  <rect x="40" y="139" width="400" height="88" rx="0" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="60" y="163" fill="#888" font-size="11" font-weight="700">MIDDLE — Turns 3 to N-4</text>
  <text x="60" y="179" fill="#c8f135" font-size="10" font-weight="600">COMPRESSED</text>
  <text x="124" y="179" fill="#555" font-size="10">·  Entity-encoded · redundancy pruned</text>
  <text x="60" y="195" fill="#555" font-size="9.5">"postgres://db.prod/main"  →  §E1  (registry preserves value)</text>
  <text x="60" y="211" fill="#555" font-size="9.5">Filler turns removed · ~22% tokens saved · lossless</text>

  <!-- TAIL block -->
  <rect x="40" y="226" width="400" height="90" rx="10" fill="#1a2800" stroke="#c8f135" stroke-width="2"/>
  <rect x="40" y="226" width="400" height="20" fill="#1a2800"/><!-- overlap fixer -->
  <text x="60" y="252" fill="#c8f135" font-size="11" font-weight="700">TAIL — Last 4 Turns</text>
  <text x="60" y="268" fill="#9cb830" font-size="10">VERBATIM</text>
  <text x="148" y="268" fill="#555" font-size="10">·  Current task state, recent decisions</text>
  <text x="60" y="284" fill="#666" font-size="9.5">Agent's working memory — never compressed</text>
  <text x="60" y="300" fill="#666" font-size="9.5">Probe facts live here → context quality score 4.26/5</text>

  <!-- Right-side labels -->
  <!-- HEAD label -->
  <line x1="444" y1="104" x2="470" y2="104" stroke="#c8f135" stroke-width="1.5"/>
  <text x="476" y="101" fill="#c8f135" font-size="10" font-weight="600">Safe</text>
  <text x="476" y="113" fill="#9cb830" font-size="9">verbatim</text>

  <!-- MIDDLE label -->
  <line x1="444" y1="183" x2="470" y2="183" stroke="#555" stroke-width="1.5"/>
  <text x="476" y="180" fill="#888" font-size="10" font-weight="600">Compressed</text>
  <text x="476" y="192" fill="#555" font-size="9">−22% tokens</text>

  <!-- TAIL label -->
  <line x1="444" y1="271" x2="470" y2="271" stroke="#c8f135" stroke-width="1.5"/>
  <text x="476" y="268" fill="#c8f135" font-size="10" font-weight="600">Safe</text>
  <text x="476" y="280" fill="#9cb830" font-size="9">verbatim</text>

  <!-- Compression arrow on middle -->
  <text x="544" y="176" fill="#555" font-size="9" text-anchor="middle">↕ only this</text>
  <text x="544" y="188" fill="#555" font-size="9" text-anchor="middle">layer is</text>
  <text x="544" y="200" fill="#555" font-size="9" text-anchor="middle">touched</text>

  <!-- Bottom note -->
  <text x="300" y="326" fill="#333" font-size="9" text-anchor="middle">promptolian.com · context_engine.py · MIT open source</text>
</svg>
